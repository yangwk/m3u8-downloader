<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>popup</title>
	<link rel="shortcut icon" href="../img/icon128.png" type="image/png" />
	<link href="index.css" rel="stylesheet" type="text/css">
    <script src="../js/myreader.js" type="text/javascript"></script>
	<script src="../js/myutils.js" type="text/javascript"></script>
    <script src="../js/mydiffrendering.js" type="text/javascript"></script>
	<script src="index.js" type="text/javascript"></script>
  </head>
  
  <body>
	<div>
		<ul id="page-nav" class="nav nav-tabs">
		  <li class="active"><a href="#" id="monitor-show" data-msg="monitor" >monitor</a></li>
		  <li><a href="#" id="manual-show" data-msg="manual">manual</a></li>
		  <li><a href="#" id="download-show" data-msg="download">download</a></li>
		  <li><a href="#" id="settings-show" data-msg="settings">settings</a></li>
		  <li><a href="#" id="running-show" data-msg="running">running</a></li>
		</ul>
		<div id="page-wrapper">
			<div id="monitor-page" class="show">
				<div>
					<span id="monitor-count" class="badge" data-title="monitorMonitoredCount">-</span>
                    <span class="badge badge-b" id="monitor-reload" data-msg="reload">reload</span>
					<span class="badge badge-b" id="monitor-clean" data-msg="clean">clean</span>
                    <select id="monitor-filter-mediatype" class="empty-select select-tweak1" data-title="filterMediaType" >
                      <option value="">&nbsp;</option>
                      <option value="m3u8">m3u8</option>
                      <option value="video">video</option>
                      <option value="audio">audio</option>
                    </select>
                    <select id="monitor-filter-duration" class="empty-select select-tweak1" data-title="filterDuration" >
                      <option value="">&nbsp;</option>
                      <option value="1">[00:00:01 , 00:00:30)</option>
                      <option value="2">[00:00:30 , 00:01:00)</option>
                      <option value="3">[00:01:00 , 00:03:00)</option>
                      <option value="4">[00:03:00 , 00:06:00)</option>
                      <option value="5">[00:06:00 , 00:10:00)</option>
                      <option value="6">[00:10:00 , 00:30:00)</option>
                      <option value="7">[00:30:00 , 01:00:00)</option>
                      <option value="8">[01:00:00 , ∞)</option>
                    </select>
					<span class="ver-mid"><input type="text" id="monitor-copyholder" class="copyholder" /></span>
				</div>
				<div id="monitor-content"></div>
			</div>
			<div id="manual-page" class="hide">
				<div class="simple-row">
					<textarea id="manual-url" class="textarea-url" data-place="inputValidURL"></textarea>
                </div>
                <div class="simple-row">
                    <textarea id="manual-headers" class="textarea-headers" data-place="inputValidHeaders"></textarea>
                </div>
                <div class="simple-row">
					<input type="text" data-place="inputFileName" id="manual-name" />
				</div>
				<div class="simple-row">
					<label class="not-select" data-msg="manualM3u8Tip">m3u8</label>
					<input type="checkbox" id="manual-m3u8" />
				</div>
                <div class="simple-row">
					<label class="not-select" data-msg="manualMethod">method</label>
					<select id="manual-method">
					  <option value="GET">GET</option>
					  <option value="POST">POST</option>
					</select>
				</div>
				<div>
					<span class="badge badge-b" id="manual-download" data-msg="download">download</span>
					<span class="badge badge-b" id="manual-clean" data-msg="clean">clean</span>
				</div>
			</div>
			<div id="download-page" class="hide">
				<div>
					<span class="badge badge-c active" id="download-downloading-show" data-msg="downloadDlingShow">downloading</span>
					<span id="download-downloading-count" class="badge" data-title="downloadDlingCount">-</span>
					<span class="badge badge-c" id="download-batch-show" data-msg="downloadBatchShow">batch</span>
					<span id="download-batch-count" class="badge" data-title="downloadBatchCount">-</span>
                    <span class="badge badge-b" id="download-reload" data-msg="reload" data-title="downloadReloadTip">reload</span>
                    <span class="ver-mid"><input type="text" id="download-copyholder" class="copyholder" /></span>
				</div>
				<div>
					<div id="download-downloading-page" class="show">
						<div id="download-downloading-content"></div>
					</div>
					<div id="download-batch-page" class="hide">
						<div id="download-batch-content"></div>
					</div>
				</div>
			</div>
			<div id="settings-page" class="hide">
				<div class="simple-row">
					<label class="not-select" data-msg="settingsEnvironment">environment</label>
					<select id="settings-environment">
					  <option value="nothing" data-msg="nothing">nothing</option>
					  <option value="pc" data-msg="settingsEnvironmentPC">pc</option>
					  <option value="mobile" data-msg="settingsEnvironmentMobile">mobile</option>
					</select>
				</div>
				<div class="simple-row">
					<label class="not-select" data-msg="settingsMonitorMax">mntmax</label>
					<input type="number" step="1" min="1" max="200" id="settings-mntmax" />
				</div>
				<div class="simple-row">
					<label class="not-select" data-msg="settingsDlingMax">dlingmax</label>
					<input type="number" step="1" min="1" max="10" id="settings-dlingmax" />
				</div>
				<div class="simple-row">
					<label class="not-select" data-msg="settingsDlBatchMax">dlbtmax</label>
					<input type="number" step="1" min="1" max="10" id="settings-dlbtmax" />
				</div>
                <div class="simple-row">
					<label class="not-select" data-msg="settingsBatchConcurrent">batchc</label>
					<input type="checkbox" id="settings-batchc" />
				</div>
				<div class="simple-row">
					<label class="not-select" data-msg="settingsPopupWidth">popwidth</label>
					<input type="number" step="20" min="494" max="4000" id="settings-popwidth" />
				</div>
				<div class="simple-row">
					<label class="not-select" data-msg="settingsPopupHeight">popheight</label>
					<input type="number" step="20" min="435" max="3000" id="settings-popheight" />
				</div>
                <div class="simple-row">
                    <label class="not-select" data-msg="settingsSplitThreshold">splitthr</label>
                    <input type="number" step="1" min="1" max="1024" id="settings-splitthr" />
				</div>
                <div class="simple-row">
                    <label class="not-select" data-msg="settingsFileProcess">filepro</label>
                    <select id="settings-filepro">
					  <option value="split" data-msg="settingsFileProcessSplit">split</option>
					  <option value="processor" data-msg="settingsFileProcessProcessor">processor</option>
					</select>
				</div>
				<div class="simple-row">
					<label class="not-select" data-msg="settingsPromptWhenExist">pwe</label>
					<input type="checkbox" id="settings-pwe" />
				</div>
				<div class="simple-row">
					<label class="not-select" data-msg="settingsNewFolderAtRoot">nfar</label>
					<input type="checkbox" id="settings-nfar" />
				</div>
				<div class="simple-row">
					<label class="not-select" data-msg="settingsPlaySoundWhenComplete">pswc</label>
					<input type="checkbox" id="settings-pswc" />
				</div>
                <div class="simple-row">
                    <label class="not-select" data-msg="settingsDownloaderPageSize">dps</label>
                    <input type="number" step="1" min="1" max="200" id="settings-dps" />
				</div>
                <div class="simple-row">
                    <label class="not-select" data-msg="settingsConvertSubtitles">cs</label>
                    <input type="checkbox" id="settings-cs" />
				</div>
                <div class="simple-row">
                    <label class="not-select" data-msg="settingsBrokenSequence">bseq</label>
                    <input type="checkbox" id="settings-bseq" />
				</div>
                <div class="simple-row">
                    <label class="not-select" data-msg="settingsAutoReload">ar</label>
                    <input type="number" step="2" min="0" max="60" id="settings-ar" />
				</div>
				<div class="simple-row">
					<label class="not-select" data-msg="settingsProxyAddress">pa</label>
                    <input type="checkbox" id="settings-paenable" />
                </div>
                <div class="simple-row">
                    <input type="text" id="settings-pa" data-place="inputValidURL" />
				</div>
				<div class="simple-row">
					<label class="not-select" data-msg="settingsMatchingRule">mr</label>
                    <input type="checkbox" id="settings-mrenable" />
                </div>
                <div class="simple-row">
                    <textarea id="settings-mr" class="textarea-mr" data-place="inputValidMatchingRule"></textarea>
				</div>
				<div>
					<span class="badge badge-b" id="settings-submit" data-msg="submit">submit</span>
                    <span class="badge badge-b" id="settings-popupintab" data-msg="settingsPopupInTab">popupintab</span>
				</div>
				
			</div>
			<div id="running-page" class="hide">
                <div>
					<span class="badge badge-b" id="running-reload" data-msg="reload">reload</span>
				</div>
				<div id="running-content"></div>
			</div>
		</div>
	</div>
    
    <div id="modal-container" class="modal-content">
        <div id="modal-inner">
            <div id="modal-min" class="min-btn" data-title="minimizePopup">-</div>
            <div id="modal-close" class="close-btn" data-title="closePopup">×</div>
            <div id="modal-primary" class="modal-body line-wrapping"></div>
        </div>
    </div>
  </body>
</html>
